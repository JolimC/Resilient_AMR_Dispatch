services:
  mqtt:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t healthcheck -m ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  ros2:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    stdin_open: true
    tty: true
    depends_on:
      mqtt:
        condition: service_healthy
    environment:
      DISPLAY: ${DISPLAY:-:0}
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      MPLBACKEND: TkAgg
      QT_X11_NO_MITSHM: "1"
      ROS_DOMAIN_ID: "42"
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-wayland-0}
      XDG_RUNTIME_DIR: /mnt/wslg/runtime-dir
      PULSE_SERVER: /mnt/wslg/PulseServer
    volumes:
      - ./src:/workspace/src
      - /mnt/wslg:/mnt/wslg
      - /tmp/.X11-unix:/tmp/.X11-unix
    working_dir: /workspace
    command:
      - bash
      - -lc
      - >-
        source /opt/ros/jazzy/setup.bash &&
        colcon build --symlink-install &&
        exec sleep infinity

volumes:
  mosquitto-data:
  mosquitto-log:
