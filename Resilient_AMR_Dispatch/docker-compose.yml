services:
  mqtt:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t healthcheck -m ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  ros2:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    stdin_open: true
    tty: true
    depends_on:
      mqtt:
        condition: service_healthy
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      ROS_DOMAIN_ID: "42"
    volumes:
      - ./src:/workspace/src
    working_dir: /workspace
    command:
      - bash
      - -lc
      - >-
        source /opt/ros/jazzy/setup.bash &&
        colcon build --symlink-install &&
        exec sleep infinity

volumes:
  mosquitto-data:
  mosquitto-log:
