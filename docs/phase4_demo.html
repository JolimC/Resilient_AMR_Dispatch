<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phase 4 Demo</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            font-family: Arial, sans-serif;
        }

        .container {
            width: min(1000px, 95vw);
            color: white;
            text-align: center;
        }

        video {
            width: 100%;
            max-height: 80vh;
            border-radius: 12px;
            background: black;
        }

        a {
            color: #8ab4f8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Phase 4 Demo</h1>

        <video controls>
            <source src="phase4_demo.mp4" type="video/mp4" />
            Your browser does not support the HTML5 video tag.
        </video>

        <p>
            <a href="phase4_demo.mp4">Download the video</a>
        </p>
    </div>
</body>
</html>
